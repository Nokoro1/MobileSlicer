name: Android Release Dry Run

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "android-app/**"
      - "engine-wrapper/**"
      - "scripts/**"
      - ".github/workflows/android-release-dry-run.yml"
  pull_request:
    paths:
      - "android-app/**"
      - "engine-wrapper/**"
      - "scripts/**"
      - ".github/workflows/android-release-dry-run.yml"

concurrency:
  group: android-release-dry-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-dry-run:
    name: Release Build Dry Run
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x android-app/gradlew

      - name: Compile release sources
        working-directory: android-app
        run: ./gradlew compileReleaseKotlin lintVitalRelease

      - name: Signed release artifact dry run
        working-directory: android-app
        env:
          MOBILE_SLICER_RELEASE_KEYSTORE_BASE64: ${{ secrets.MOBILE_SLICER_RELEASE_KEYSTORE_BASE64 }}
          MOBILE_SLICER_RELEASE_STORE_FILE: ${{ runner.temp }}/mobileslicer-release.jks
          MOBILE_SLICER_RELEASE_STORE_PASSWORD: ${{ secrets.MOBILE_SLICER_RELEASE_STORE_PASSWORD }}
          MOBILE_SLICER_RELEASE_KEY_ALIAS: ${{ secrets.MOBILE_SLICER_RELEASE_KEY_ALIAS }}
          MOBILE_SLICER_RELEASE_KEY_PASSWORD: ${{ secrets.MOBILE_SLICER_RELEASE_KEY_PASSWORD }}
          MOBILE_SLICER_VERSION_CODE: ${{ github.run_number }}
          MOBILE_SLICER_VERSION_NAME: 0.1.0-rc.${{ github.run_number }}
        run: |
          if [ -z "$MOBILE_SLICER_RELEASE_KEYSTORE_BASE64" ]; then
            echo "Release signing secrets are not configured; compileReleaseKotlin and lintVitalRelease were run only."
            echo "Configure MOBILE_SLICER_RELEASE_KEYSTORE_BASE64 and matching password/alias secrets before RC."
            exit 0
          fi
          printf '%s' "$MOBILE_SLICER_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$MOBILE_SLICER_RELEASE_STORE_FILE"
          ./gradlew assembleRelease bundleRelease
