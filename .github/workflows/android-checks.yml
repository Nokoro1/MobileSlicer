name: Android Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: android-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Android App
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make verification scripts executable
        run: |
          chmod +x android-app/gradlew
          chmod +x scripts/verify_android.sh
          chmod +x scripts/verify_stub_inventory.py

      - name: Validate native stub inventory
        run: scripts/verify_android.sh stubs

      - name: Run verification script syntax checks
        run: scripts/verify_android.sh script-tests

      - name: Run JVM unit tests
        working-directory: android-app
        run: ./gradlew testDebugUnitTest

      - name: Run Android debug lint
        working-directory: android-app
        run: ./gradlew lintDebug

      - name: Assemble debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug

      - name: Run release compile and vital lint
        working-directory: android-app
        run: ./gradlew compileReleaseKotlin lintVitalRelease
